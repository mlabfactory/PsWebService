server {
    listen 80;
    server_name aidyis-prod.dolcezampa.com;
	
    location ^~ /.well-known {
	root /var/www/certbot;
	allow all;
	default_type "text/plain";
    }
    client_max_body_size 500M;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name aidyis-prod.dolcezampa.com;
    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/www.dolcezampa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.dolcezampa.com/privkey.pem;

    client_max_body_size 500M;
    
    location / {
        proxy_pass http://dolcezampa_prestashop;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
        proxy_hide_header Content-Security-Policy;
    }
}
