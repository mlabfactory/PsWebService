server {
    listen 80;
    server_name www.dolcezampa.com;

    # Per Let's Encrypt / Certbot
    location ^~ /.well-known {
        root /var/www/certbot;
        allow all;
        default_type "text/plain";
    }

    client_max_body_size 64M;

    # Rileva HTTPS da CloudFront
    set $forwarded_proto $http_cloudfront_forwarded_proto;
    if ($forwarded_proto = '') {
        set $forwarded_proto $scheme;
    }

    location / {
        proxy_pass http://dolcezampa_prestashop:80;

        # Forward degli header standard
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Qui la differenza cruciale 👇
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Buffer ottimizzati
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }
}
